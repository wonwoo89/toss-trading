name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 같은 브랜치/PR 에 새 푸시가 오면 진행 중인 실행을 취소
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wasm-test:
    name: WASM 지표 커널 테스트
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: WASM 빌드 (AssemblyScript)
        run: pnpm run build:wasm
      - name: 커널 회귀 테스트 (WASM↔JS 비트 일치)
        run: node wasm/test/indicators.test.mjs

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  build:
    name: 타입체크 & 빌드
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
