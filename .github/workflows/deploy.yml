name: Deploy (Lightsail)

# main 의 CI 가 성공한 직후에만 배포한다.
# (CI: 타입체크/빌드 · ESLint · WASM 커널 테스트 — 셋 중 하나라도 실패하면 배포 안 함)
# 수동 배포가 필요하면 Actions 탭에서 "Run workflow" 로 직접 실행할 수 있다.
#
# 빌드(WASM asc + vite)는 CPU 를 많이 써서 작은 버스트 인스턴스에서 돌리면 CPU 크레딧을
# 소진시켜 throttle/먹통을 유발한다. 그래서 빌드는 러너(무료 CPU)에서 하고, 결과물(dist)만
# 서버로 rsync 한 뒤 서버는 빌드 없이 재시작만 한다.
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

# 배포는 절대 중간에 끊지 않는다. 새 배포는 진행 중인 배포가 끝난 뒤 순차 실행된다.
concurrency:
  group: deploy-lightsail
  cancel-in-progress: false

jobs:
  deploy:
    name: Lightsail 재배포 (러너 빌드 → dist 전송 → 재시작)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # workflow_run 으로 트리거된 경우엔 CI 가 success 일 때만, 수동 실행은 항상 진행.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event.workflow_run.conclusion == 'success' }}
    steps:
      # 1) 러너에서 빌드 (서버 CPU 0 소모) — ci.yml 의 build 잡과 동일 환경
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: 빌드 (WASM + 프론트 dist)
        run: pnpm run build:all

      # 2) 러너를 테일넷에 임시(ephemeral) 노드로 합류 — 잡 종료 시 자동 제거, 공개 포트 없음
      - name: Tailscale 연결
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      # 3) 빌드 결과(dist)를 서버로 전송 (Tailscale SSH 위 rsync, 오래된 파일은 --delete 로 정리)
      - name: dist 전송 (rsync)
        env:
          TS_SSH_USER: ${{ vars.TS_SSH_USER }}
          TS_SERVER_HOST: ${{ vars.TS_SERVER_HOST }}
        run: |
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20" \
            dist/ "${TS_SSH_USER}@${TS_SERVER_HOST}:toss-trading/dist/"

      # 4) 서버 반영: git pull(server/*.ts) + 의존성 + pm2 재시작 (SKIP_BUILD=1 → 서버 빌드 없음)
      - name: 서버 반영 (SKIP_BUILD)
        env:
          TS_SSH_USER: ${{ vars.TS_SSH_USER }}
          TS_SERVER_HOST: ${{ vars.TS_SERVER_HOST }}
        run: |
          # ServerAliveCountMax=12 → 15s×12 = 3분까지 무응답 허용.
          # 대용량 의존성 설치 중 서버가 일시적으로 바빠져도 세션을 끊지 않는다.
          # git pull 을 먼저 해서 update.sh 자체의 수정이 이번 배포부터 적용되게 한다.
          ssh \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=12 \
            "${TS_SSH_USER}@${TS_SERVER_HOST}" \
            'cd ~/toss-trading && git pull --ff-only && SKIP_BUILD=1 ./update.sh'
