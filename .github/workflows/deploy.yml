name: Deploy (Lightsail)

# main 의 CI 가 성공한 직후에만 배포한다.
# (CI: 타입체크/빌드 · ESLint · WASM 커널 테스트 — 셋 중 하나라도 실패하면 배포 안 함)
# 수동 배포가 필요하면 Actions 탭에서 "Run workflow" 로 직접 실행할 수 있다.
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

# 배포는 절대 중간에 끊지 않는다(빌드 도중 프로세스가 죽지 않도록).
# 새 배포는 진행 중인 배포가 끝난 뒤 순차 실행된다.
concurrency:
  group: deploy-lightsail
  cancel-in-progress: false

jobs:
  deploy:
    name: Lightsail 재배포 (update.sh)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # workflow_run 으로 트리거된 경우엔 CI 가 success 일 때만,
    # 수동(workflow_dispatch) 실행은 항상 진행.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event.workflow_run.conclusion == 'success' }}
    steps:
      # 러너를 테일넷에 임시(ephemeral) 노드로 합류시킨다.
      # 잡이 끝나면 노드는 테일넷에서 자동 제거된다. 공개 포트는 열지 않는다.
      - name: Tailscale 연결
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      # Tailscale SSH 로 서버에 접속해 기존 배포 스크립트를 그대로 실행한다.
      # 인증은 테일넷 신원(tag:ci → tag:prod, ACL ssh 규칙)으로 처리되므로
      # SSH 개인키를 secret 으로 둘 필요가 없다.
      # update.sh: git pull → pnpm install → build:all → pm2 restart → health check
      - name: 서버 배포 (update.sh)
        env:
          TS_SSH_USER: ${{ vars.TS_SSH_USER }}
          TS_SERVER_HOST: ${{ vars.TS_SERVER_HOST }}
        run: |
          ssh \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            "${TS_SSH_USER}@${TS_SERVER_HOST}" \
            'cd ~/toss-trading && ./update.sh'
