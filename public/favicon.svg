<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <!-- 방향별 파스텔: 상승=붉은톤, 꺾임=보라, 하락=파란톤 (좌→우 x 위치로 매핑) -->
    <linearGradient id="trend" x1="4" y1="0" x2="45" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f2a7b1"/>
      <stop offset=".34" stop-color="#b095f0"/>
      <stop offset=".5" stop-color="#a4c4f2"/>
      <stop offset=".65" stop-color="#b095f0"/>
      <stop offset="1" stop-color="#f2a7b1"/>
    </linearGradient>
  </defs>
  <!-- 영역(fill) — 같은 그라데이션을 은은하게 -->
  <path d="M4 38 C8 37 13 24 18 23 C22 22 25 30 30 30 C36 30 40 12 45 7 L45 45 L4 45 Z"
        fill="url(#trend)" fill-opacity=".28"/>
  <!-- 차트 라인 (방향별 파스텔 그라데이션) -->
  <path d="M4 38 C8 37 13 24 18 23 C22 22 25 30 30 30 C36 30 40 12 45 7"
        fill="none" stroke="url(#trend)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 가장 오른쪽 정상까지의 상승 구간을 더 두껍게 -->
  <path d="M30 30 C36 30 40 12 45 7"
        fill="none" stroke="url(#trend)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
